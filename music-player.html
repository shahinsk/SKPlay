<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SKPlay — World Music</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─────────── TOKENS ─────────── */
:root {
  --bg:    #07070f;
  --bg2:   #0d0d1b;
  --card:  #181828;
  --cardh: #1f1f32;
  --b:     rgba(255,255,255,0.07);
  --bh:    rgba(255,255,255,0.12);
  --ac:    #7c6af7;
  --acd:   #5b4de0;
  --acg:   rgba(124,106,247,0.14);
  --pk:    #f7826a;
  --go:    #fbbf24;
  --t1:    #f0effe;
  --t2:    #9490b8;
  --t3:    #4a476a;
  --ok:    #34d399;
  --ph:    136px;   /* player height - fixed */
}

/* ─────────── RESET ─────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--t1); font-family:'Inter',sans-serif; font-size:14px; }
button { font-family:'Inter',sans-serif; cursor:pointer; }
input  { font-family:'Inter',sans-serif; }

/* ─────────── LAYOUT ─────────── 
   Sidebar + Main side by side.
   Player is position:fixed at bottom — NEVER cut off on any device.
   Main has padding-bottom = player height so content doesn't hide behind player.
*/
.layout {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─────────── SIDEBAR ─────────── */
.sidebar {
  width: 256px;
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--b);
  overflow-y: auto;
  overflow-x: hidden;
  height: 100vh;
  padding-bottom: var(--ph);
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--bh); border-radius: 3px; }

.sb-brand {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--b);
}
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:26px; letter-spacing:-.03em; line-height:1; }
.logo em { color:var(--ac); font-style:normal; }
.logo-sub { font-size:10px; color:var(--t3); letter-spacing:.14em; text-transform:uppercase; margin-top:4px; font-weight:500; }

.sb-sec { padding: 14px 12px 8px; }
.sb-lbl { font-family:'Syne',sans-serif; font-size:9.5px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--t3); margin-bottom:8px; padding-left:6px; }

.lbtn {
  display:flex; align-items:center; gap:10px;
  width:100%; padding:9px 10px; border-radius:10px;
  border:1.5px solid transparent; background:none;
  color:var(--t2); text-align:left; transition:all .15s; margin-bottom:2px;
}
.lbtn:hover { background:var(--card); }
.lbtn.on    { background:var(--acg); border-color:rgba(124,106,247,.3); }
.lbtn.on .lname { color:var(--t1); font-weight:600; }
.lflag { width:32px; height:32px; border-radius:50%; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.lname { font-size:13.5px; font-weight:500; }

.gpills { display:flex; flex-wrap:wrap; gap:6px; padding:0 4px; }
.gp {
  padding:5px 12px; border-radius:20px;
  border:1px solid var(--bh); background:var(--card);
  font-size:12px; font-weight:500; color:var(--t3); transition:all .15s;
}
.gp:hover { border-color:var(--ac); color:var(--ac); }
.gp.on    { background:var(--ac); border-color:var(--ac); color:#fff; font-weight:600; }

.libtn {
  display:flex; align-items:center; gap:10px;
  width:100%; padding:9px 12px; border-radius:10px;
  background:none; border:none; color:var(--t3);
  font-size:13px; font-weight:500; transition:all .15s;
}
.libtn:hover { background:var(--card); color:var(--t2); }
.libtn svg { width:15px; height:15px; flex-shrink:0; }

/* ─────────── MAIN ─────────── */
.main {
  flex:1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 22px 24px;
  padding-bottom: calc(var(--ph) + 16px);  /* ← critical: room for fixed player */
  background: var(--bg);
  height: 100vh;
}
.main::-webkit-scrollbar { width:4px; }
.main::-webkit-scrollbar-thumb { background:var(--bh); border-radius:4px; }

/* Top bar */
.topbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; }

.hbtn {
  display: none;
  width:40px; height:40px; border-radius:10px;
  background:var(--card); border:1px solid var(--bh);
  align-items:center; justify-content:center; color:var(--t2); flex-shrink:0;
}
.hbtn svg { width:19px; height:19px; }

.sbox {
  flex:1; max-width:400px;
  display:flex; align-items:center; gap:10px;
  background:var(--card); border:1.5px solid var(--bh);
  border-radius:40px; padding:9px 14px;
  transition:border-color .2s, box-shadow .2s;
}
.sbox:focus-within { border-color:var(--ac); box-shadow:0 0 0 3px rgba(124,106,247,.12); }
.sbox input { background:none; border:none; color:var(--t1); font-size:14px; width:100%; outline:none; }
.sbox input::placeholder { color:var(--t3); }
.sgo {
  background:var(--ac); border:none; border-radius:50%;
  width:30px; height:30px; display:flex; align-items:center; justify-content:center;
  transition:background .2s, transform .1s; flex-shrink:0;
}
.sgo:hover { background:var(--acd); transform:scale(1.08); }
.sgo svg { width:14px; height:14px; }

.vizbars { display:flex; align-items:flex-end; gap:3px; height:22px; margin-left:auto; flex-shrink:0; }
.vb { width:3px; background:var(--ac); border-radius:2px; opacity:.3; }
.viz-on .vb:nth-child(1){animation:vd .55s ease-in-out infinite alternate;}
.viz-on .vb:nth-child(2){animation:vd .73s ease-in-out infinite alternate .12s;}
.viz-on .vb:nth-child(3){animation:vd .42s ease-in-out infinite alternate .22s;}
.viz-on .vb:nth-child(4){animation:vd .65s ease-in-out infinite alternate .07s;}
.viz-on .vb:nth-child(5){animation:vd .49s ease-in-out infinite alternate .17s;}
@keyframes vd { from{height:4px;opacity:.3} to{height:20px;opacity:1} }

/* Status badge */
.sbadge {
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 12px; border-radius:20px;
  font-size:11.5px; font-weight:600; margin-bottom:14px;
}
.sbadge.green { background:rgba(52,211,153,.1);  border:1px solid rgba(52,211,153,.3);  color:var(--ok); }
.sbadge.gold  { background:rgba(251,191,36,.1);  border:1px solid rgba(251,191,36,.3);  color:var(--go); }
.blink { width:6px; height:6px; border-radius:50%; animation:blk 2s ease-in-out infinite; }
.blink.g { background:var(--ok); }
.blink.y { background:var(--go); }
@keyframes blk { 0%,100%{opacity:1} 50%{opacity:.3} }

/* Content heading */
.chead { display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:14px; }
.ctitle { font-family:'Syne',sans-serif; font-size:22px; font-weight:700; letter-spacing:-.02em; line-height:1.2; }
.ctitle span { color:var(--ac); }
.cmeta { font-size:12px; color:var(--t3); font-weight:500; }

/* State boxes */
.statebox { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:220px; gap:14px; color:var(--t3); font-size:14px; text-align:center; padding:20px; }
.spin { width:36px; height:36px; border:3px solid var(--bh); border-top-color:var(--ac); border-radius:50%; animation:sp .75s linear infinite; }
@keyframes sp { to{transform:rotate(360deg)} }

/* Track list */
.tlist { display:flex; flex-direction:column; gap:2px; }
.trow {
  display:grid;
  grid-template-columns: 26px 44px 1fr auto 50px 30px;
  align-items:center; gap:11px;
  padding:8px 10px; border-radius:10px;
  cursor:pointer; border:1px solid transparent;
  transition:background .12s, border-color .12s;
}
.trow:hover { background:var(--card); border-color:var(--bh); }
.trow.now   { background:linear-gradient(135deg,rgba(124,106,247,.13),rgba(247,130,106,.05)); border-color:rgba(124,106,247,.3); }

.tnum { font-size:12px; color:var(--t3); text-align:center; font-variant-numeric:tabular-nums; }
.trow.now .tnum { color:var(--ac); }

.timg { width:44px; height:44px; border-radius:8px; object-fit:cover; background:var(--card); flex-shrink:0; }
.tph  { width:44px; height:44px; border-radius:8px; background:linear-gradient(135deg,var(--card),var(--cardh)); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }

.tinfo { min-width:0; }
.tname { font-size:13.5px; font-weight:600; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
.trow.now .tname { color:var(--ac); }
.tsub { font-size:11.5px; color:var(--t3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.tbadge { font-size:10px; font-weight:700; letter-spacing:.04em; padding:2px 8px; border-radius:20px; border:1.5px solid; white-space:nowrap; }
.bhi { border-color:rgba(255,160,60,.5);  color:#ffb347; background:rgba(255,160,60,.08); }
.ben { border-color:rgba(96,180,255,.5);  color:#74b9ff; background:rgba(96,180,255,.08); }
.bbe { border-color:rgba(72,219,152,.5);  color:#55efc4; background:rgba(72,219,152,.08); }
.bte { border-color:rgba(220,100,220,.5); color:#e84de8; background:rgba(220,100,220,.08); }
.bpu { border-color:rgba(255,214,60,.5);  color:#ffd43b; background:rgba(255,214,60,.08); }
.bta { border-color:rgba(255,118,118,.5); color:#ff7675; background:rgba(255,118,118,.08); }
.bgl { border-color:rgba(162,155,254,.3); color:#a29bfe; background:rgba(162,155,254,.06); }

.tdur  { font-size:12px; color:var(--t3); text-align:right; font-variant-numeric:tabular-nums; }
.tfav  { background:none; border:none; font-size:17px; color:var(--t3); transition:color .15s, transform .12s; line-height:1; padding:4px; }
.tfav:hover { color:var(--pk); transform:scale(1.25); }
.tfav.on    { color:var(--pk); }

.eqpip { display:inline-block; width:7px; height:7px; background:var(--ac); border-radius:50%; animation:pip 1.1s ease-in-out infinite; box-shadow:0 0 6px var(--ac); }
@keyframes pip { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(.5);opacity:.5} }

/* ═════════════════════════════════════════════════
   PLAYER BAR — position:fixed, always at bottom
   NEVER cut off, NEVER disappears on any device
═════════════════════════════════════════════════ */
.player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  height: var(--ph);
  background: rgba(9,9,20,0.98);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border-top: 1px solid var(--bh);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  padding: 0 24px;
}
.player::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,var(--ac),transparent); opacity:.4;
}

/* Progress row */
.prog-row {
  display:flex; align-items:center; gap:10px; width:100%;
}
.tlbl { font-size:11px; color:var(--t3); font-variant-numeric:tabular-nums; width:32px; flex-shrink:0; }
.tlbl.r { text-align:right; }
.pbar { flex:1; height:4px; background:var(--cardh); border-radius:4px; cursor:pointer; position:relative; transition:height .15s; }
.pbar:hover { height:6px; }
.pfill { height:100%; background:linear-gradient(90deg,var(--acd),var(--ac),#a78bfa); border-radius:4px; pointer-events:none; position:relative; min-width:0; }
.pfill::after { content:''; position:absolute; right:-5px; top:50%; transform:translateY(-50%); width:10px; height:10px; background:#fff; border-radius:50%; opacity:0; transition:opacity .15s; box-shadow:0 0 6px rgba(124,106,247,.8); }
.pbar:hover .pfill::after { opacity:1; }

/* Controls row */
.ctrl-row {
  display:flex; align-items:center; gap:0; width:100%;
}

/* Now playing section */
.np-area {
  display:flex; align-items:center; gap:11px;
  flex: 0 0 220px; min-width:0;
}
.np-art { width:46px; height:46px; border-radius:9px; object-fit:cover; flex-shrink:0; box-shadow:0 4px 14px rgba(0,0,0,.5); }
.np-ph  { width:46px; height:46px; border-radius:9px; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.np-txt { min-width:0; flex:1; }
.np-title { font-size:13px; font-weight:600; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.np-sub   { font-size:11px; color:var(--t3); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.np-lk  { background:none; border:none; font-size:17px; color:var(--t3); transition:color .15s, transform .12s; flex-shrink:0; padding:4px; margin-left:4px; }
.np-lk:hover { color:var(--pk); transform:scale(1.2); }
.np-lk.on    { color:var(--pk); }

/* Buttons center */
.btns-area {
  display:flex; align-items:center; gap:10px;
  flex:1; justify-content:center;
}
.cbtn { background:none; border:none; color:var(--t3); display:flex; align-items:center; justify-content:center; padding:6px; border-radius:7px; transition:color .15s, transform .12s; }
.cbtn:hover { color:var(--t2); transform:scale(1.1); }
.cbtn.on    { color:var(--ac); }
.cbtn svg   { width:19px; height:19px; }
.playbtn {
  width:44px; height:44px; border-radius:50%;
  background:var(--ac); border:none;
  display:flex; align-items:center; justify-content:center;
  transition:all .2s; box-shadow:0 0 22px rgba(124,106,247,.5); flex-shrink:0;
}
.playbtn:hover { background:var(--acd); transform:scale(1.07); box-shadow:0 0 30px rgba(124,106,247,.7); }
.playbtn svg { width:17px; height:17px; fill:white; }

/* Volume area */
.vol-area {
  display:flex; align-items:center; gap:8px;
  flex: 0 0 160px; justify-content:flex-end;
}
.vol-area svg { width:15px; height:15px; fill:var(--t3); flex-shrink:0; }
.volr { -webkit-appearance:none; width:88px; height:4px; background:var(--cardh); border-radius:4px; outline:none; cursor:pointer; }
.volr::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:var(--ac); border-radius:50%; }


/* ─────────── MOBILE OVERLAY DRAWER ─────────── */
.ovlay { display:none; position:fixed; inset:0; z-index:2000; }
.ovlay.open { display:block; }
.ovbg { position:absolute; inset:0; background:rgba(0,0,0,.78); backdrop-filter:blur(4px); }
.drawer {
  position:absolute; top:0; left:0; bottom:0; width:82%; max-width:300px;
  background:var(--bg2); border-right:1px solid var(--bh);
  overflow-y:auto; padding-bottom:20px;
  transform:translateX(-100%); transition:transform .28s ease;
}
.ovlay.open .drawer { transform:translateX(0); }
.drhead { display:flex; align-items:center; justify-content:space-between; padding:18px 18px 14px; border-bottom:1px solid var(--b); }
.drlogo { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; letter-spacing:-.03em; }
.drlogo em { color:var(--ac); font-style:normal; }
.drclose { width:32px; height:32px; border-radius:8px; background:var(--card); border:none; display:flex; align-items:center; justify-content:center; color:var(--t3); }
.drclose svg { width:15px; height:15px; }

/* ═════════════════════════════════════════════════
   RESPONSIVE — mobile layout
═════════════════════════════════════════════════ */
@media (max-width: 860px) {
  .sidebar { display:none; }
  .layout  { display:block; }
  .main    { height:100vh; padding:14px 14px; padding-bottom:calc(var(--ph) + 8px); }
  .hbtn    { display:flex; }
  .ctitle  { font-size:19px; }
  /* Player: hide volume, shrink now-playing */
  .player  { padding:0 14px; gap:6px; }
  .vol-area { display:none; }
  .np-area { flex:0 0 160px; }
  .btns-area { gap:6px; }
  .cbtn svg { width:17px; height:17px; }
  /* Track rows */
  .trow { grid-template-columns:22px 38px 1fr 44px 24px; gap:8px; }
  .tbadge { display:none; }
}

@media (max-width: 500px) {
  :root { --ph: 122px; }
  .player { gap:4px; padding:0 12px; }
  .np-area { flex:0 0 140px; gap:8px; }
  .np-art, .np-ph { width:38px; height:38px; }
  .np-title { font-size:12px; }
  .np-sub   { font-size:10.5px; }
  .btns-area { gap:2px; }
  .cbtn  { padding:4px; }
  .cbtn svg { width:16px; height:16px; }
  .playbtn { width:40px; height:40px; }
  .playbtn svg { width:15px; height:15px; }
  .trow { grid-template-columns:20px 34px 1fr 22px; gap:6px; }
  .tdur { display:none; }
  .tlbl { width:28px; font-size:10px; }
}

@media (max-width: 360px) {
  :root { --ph: 116px; }
  .np-area { flex:0 0 120px; }
  .btns-area { gap:0; }
}
</style>
</head>
<body>

<!-- Mobile Drawer -->
<div class="ovlay" id="ovlay" onclick="ovClick(event)">
  <div class="ovbg"></div>
  <div class="drawer" id="drawer">
    <div class="drhead">
      <div class="drlogo">SK<em>Play</em></div>
      <button class="drclose" onclick="closeDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="drBody"></div>
  </div>
</div>

<!-- Main Layout -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sb">
    <div class="sb-brand">
      <div class="logo">SK<em>Play</em></div>
      <div class="logo-sub">World Music</div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Languages</div>
      <button class="lbtn on" data-lang="hindi"   onclick="loadLang('hindi',this)"><div class="lflag">🇮🇳</div><span class="lname">Hindi</span></button>
      <button class="lbtn"    data-lang="english" onclick="loadLang('english',this)"><div class="lflag">🌍</div><span class="lname">English</span></button>
      <button class="lbtn"    data-lang="bengali" onclick="loadLang('bengali',this)"><div class="lflag">🎵</div><span class="lname">Bengali</span></button>
      <button class="lbtn"    data-lang="telugu"  onclick="loadLang('telugu',this)"><div class="lflag">🎶</div><span class="lname">Telugu</span></button>
      <button class="lbtn"    data-lang="punjabi" onclick="loadLang('punjabi',this)"><div class="lflag">🥁</div><span class="lname">Punjabi</span></button>
      <button class="lbtn"    data-lang="tamil"   onclick="loadLang('tamil',this)"><div class="lflag">🎸</div><span class="lname">Tamil</span></button>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Genres</div>
      <div class="gpills" id="gpills">
        <div class="gp" onclick="loadGenre('pop',this)">Pop</div>
        <div class="gp" onclick="loadGenre('rock',this)">Rock</div>
        <div class="gp" onclick="loadGenre('jazz',this)">Jazz</div>
        <div class="gp" onclick="loadGenre('classical',this)">Classical</div>
        <div class="gp" onclick="loadGenre('folk',this)">Folk</div>
        <div class="gp" onclick="loadGenre('hiphop',this)">Hip-Hop</div>
        <div class="gp" onclick="loadGenre('rnb',this)">R&amp;B</div>
        <div class="gp" onclick="loadGenre('electronic',this)">Electronic</div>
        <div class="gp" onclick="loadGenre('ambient',this)">Ambient</div>
        <div class="gp" onclick="loadGenre('acoustic',this)">Acoustic</div>
      </div>
    </div>
    <div class="sb-sec">
      <div class="sb-lbl">Library</div>
      <button class="libtn" onclick="viewFavs()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        Favourites
      </button>
      <button class="libtn" onclick="viewRecent()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
        Recently Played
      </button>
      <button class="libtn" onclick="viewQueue()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Queue
      </button>
    </div>
  </aside>

<audio id="aud" preload="none"></audio>

<script>
/* ═══════════════════════════════════════════════════════════
   SKPlay Music Engine
   
   Source 1: Jamendo API  → full songs (CC licensed, 3-7 min)
             API: api.jamendo.com/v3.0/tracks
             Audio: mp3d.jamendo.com stream URLs
             
   Source 2: Deezer API   → 30s previews (fallback)
             API: api.deezer.com/search (no key needed, CORS open)
             Note: Deezer preview_url = 30s mp3
             
   Both APIs have open CORS headers — work directly in browser.
═══════════════════════════════════════════════════════════ */

// ─── Jamendo client IDs (try in order if one fails) ───────
const J_CLIENTS = ['b6747d04', '39de91c0', '7a0d8cce', 'f2293f9a'];

// ─── Language config ──────────────────────────────────────
const LANGS = {
  hindi:   { label:'Hindi',   bc:'bhi', jTags:['indian','bollywood','world+indian','hindi','desi'],        dTerms:['bollywood','hindi songs','arijit singh','ar rahman'] },
  english: { label:'English', bc:'ben', jTags:['pop','indie+pop','singer-songwriter','acoustic+pop','rock'],dTerms:['pop 2024','ed sheeran','taylor swift','pop hits'] },
  bengali: { label:'Bengali', bc:'bbe', jTags:['world','folk','indian+folk','acoustic'],                   dTerms:['bengali songs','rabindra sangeet','anupam roy'] },
  telugu:  { label:'Telugu',  bc:'bte', jTags:['carnatic','south+indian','classical+indian','india'],      dTerms:['telugu songs','tollywood','anirudh telugu'] },
  punjabi: { label:'Punjabi', bc:'bpu', jTags:['bhangra','world','folk','indian'],                        dTerms:['bhangra','diljit dosanjh','punjabi songs','ap dhillon'] },
  tamil:   { label:'Tamil',   bc:'bta', jTags:['carnatic','south+indian','world'],                        dTerms:['tamil songs','anirudh ravichander','kollywood'] },
};

const GENRES = {
  pop:       { label:'Pop',       jTag:'pop',       dT:'pop' },
  rock:      { label:'Rock',      jTag:'rock',      dT:'rock' },
  jazz:      { label:'Jazz',      jTag:'jazz',      dT:'jazz' },
  classical: { label:'Classical', jTag:'classical', dT:'classical' },
  folk:      { label:'Folk',      jTag:'folk',      dT:'folk' },
  hiphop:    { label:'Hip-Hop',   jTag:'hiphop',    dT:'hip hop' },
  rnb:       { label:'R&B',       jTag:'rnb',       dT:'r&b soul' },
  electronic:{ label:'Electronic',jTag:'electronic',dT:'electronic' },
  ambient:   { label:'Ambient',   jTag:'ambient',   dT:'ambient' },
  acoustic:  { label:'Acoustic',  jTag:'acoustic',  dT:'acoustic' },
};

// ─── State ───────────────────────────────────────────────
let tracks=[], curIdx=-1, isPlay=false, isShuffle=false, isRepeat=false;
let favs   = new Set(JSON.parse(localStorage.getItem('skp_f')||'[]'));
let recent = JSON.parse(localStorage.getItem('skp_r')||'[]');
const aud  = document.getElementById('aud');

// ════════════════════════════════════════
//  JAMENDO — full songs
// ════════════════════════════════════════
async function jFetch(params, clientIdx=0) {
  if (clientIdx >= J_CLIENTS.length) return [];
  const cid = J_CLIENTS[clientIdx];
  const p = new URLSearchParams({
    client_id: cid, format:'json',
    audioformat:'mp31', limit:'50',
    order:'popularity_total',
    ...params
  });
  try {
    const r = await fetch(`https://api.jamendo.com/v3.0/tracks/?${p}`,
      { signal: AbortSignal.timeout(9000) });
    if (!r.ok) return jFetch(params, clientIdx+1);
    const d = await r.json();
    if (d.headers?.status==='failed') return jFetch(params, clientIdx+1);
    const results = (d.results||[]).filter(x => x.id);
    if (!results.length && clientIdx < J_CLIENTS.length-1)
      return jFetch(params, clientIdx+1);
    return results;
  } catch {
    return jFetch(params, clientIdx+1);
  }
}

function jTrack(r, lang) {
  if (!r?.id) return null;
  // Build Jamendo streaming URL directly — guaranteed full song
  // Format: https://mp3d.jamendo.com/?trackid=XXXXX&format=mp31&from=app-CLIENT_ID
  const src = `https://mp3d.jamendo.com/?trackid=${r.id}&format=mp31&from=app-${J_CLIENTS[0]}`;
  return {
    id: 'j'+r.id, jid: r.id,
    name:   r.name||'Unknown',
    artist: r.artist_name||'Unknown',
    album:  r.album_name||'',
    dur:    Number(r.duration)||0,
    src,
    img:    r.image||'',
    lang:   lang||'global',
    full:   true   // ← FULL song
  };
}

// ════════════════════════════════════════
//  DEEZER — 30s preview fallback
//  (No API key, open CORS)
// ════════════════════════════════════════
async function dFetch(q, limit=25) {
  try {
    const url = `https://api.deezer.com/search?q=${encodeURIComponent(q)}&limit=${limit}&output=json`;
    const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) return [];
    const d = await r.json();
    return (d.data||[]).filter(x => x.preview);
  } catch { return []; }
}

function dTrack(r, lang) {
  return {
    id:     'd'+r.id,
    name:   r.title||'Unknown',
    artist: r.artist?.name||'Unknown',
    album:  r.album?.title||'',
    dur:    30,  // Deezer previews = 30 seconds
    src:    r.preview,
    img:    r.album?.cover_medium||r.album?.cover||'',
    lang:   lang||'global',
    full:   false  // ← preview only
  };
}

function dedupe(arr) {
  const s=new Set();
  return arr.filter(t=>{ if(!t||!t.src||s.has(t.id)) return false; s.add(t.id); return true; });
}

function detectLang(r) {
  // Deezer doesn't expose language — guess from genre
  const g=(r.genre_id||0);
  return 'global';
}

// ════════════════════════════════════════
//  LOAD LANGUAGE
// ════════════════════════════════════════
async function loadLang(lang, btn) {
  setLangOn(btn); clearGenres();
  const cfg = LANGS[lang]||LANGS.english;
  setTitle(`Trending <span>${cfg.label}</span> Songs`);
  loading();

  // Fetch Jamendo full songs (multiple tags in parallel)
  const jResults = await Promise.all(cfg.jTags.map(tag => jFetch({tags:tag})));
  const jAll = dedupe(jResults.flat().map(r=>jTrack(r,lang)).filter(Boolean));

  if (jAll.length >= 5) {
    // Great — full songs available
    tracks = jAll.slice(0, 80);
    setBadge(true, `${tracks.length} full songs via Jamendo`);
  } else {
    // Fallback to Deezer previews
    const dResults = await Promise.all(cfg.dTerms.map(t=>dFetch(t,20)));
    const dAll = dResults.flat().map(r=>dTrack(r,lang));
    tracks = dedupe([...jAll, ...dAll]).slice(0, 80);
    const full = tracks.filter(t=>t.full).length;
    setBadge(full>0, full>0
      ? `${full} full songs + ${tracks.length-full} previews`
      : `${tracks.length} previews (30s) — Jamendo unavailable`);
  }

  setMeta(tracks.length+' tracks');
  render(tracks);
}

// ════════════════════════════════════════
//  LOAD GENRE
// ════════════════════════════════════════
async function loadGenre(genre, chip) {
  clearGenres(); chip.classList.add('on');
  setLangOn(null);
  const cfg = GENRES[genre]||{label:genre,jTag:genre,dT:genre};
  setTitle(`Top <span>${cfg.label}</span> Songs`);
  loading();

  const [jRes, dRes] = await Promise.all([
    jFetch({tags:cfg.jTag, limit:'50'}),
    dFetch(cfg.dT, 30)
  ]);
  const jTracks = jRes.map(r=>jTrack(r,'global')).filter(Boolean);
  const dTracks = dRes.map(r=>dTrack(r,'global'));
  tracks = dedupe([...jTracks, ...dTracks]).slice(0,80);
  const full = tracks.filter(t=>t.full).length;
  setBadge(full>0, `${full} full · ${tracks.length-full} previews`);
  setMeta(tracks.length+' tracks');
  render(tracks);
}

// ════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════
async function doSearch() {
  const q = document.getElementById('si').value.trim();
  if (!q) return;
  setLangOn(null); clearGenres();
  setTitle(`Results for <span>"${esc(q)}"</span>`);
  loading();

  const [jName, jArtist, dRes] = await Promise.all([
    jFetch({ namesearch:q, limit:'30' }),
    jFetch({ artist_name:q, limit:'20' }),
    dFetch(q, 40)
  ]);

  const jTracks = dedupe([...jName,...jArtist].map(r=>jTrack(r,'global')).filter(Boolean));
  const dTracks = dRes.map(r=>dTrack(r,'global'));
  tracks = dedupe([...jTracks,...dTracks]).slice(0,80);

  if (!tracks.length) {
    document.getElementById('ta').innerHTML=`<div class="statebox"><span style="font-size:36px">🔍</span><span>No results for "${esc(q)}"</span></div>`;
    setMeta(''); return;
  }
  const full=tracks.filter(t=>t.full).length;
  setBadge(full>0,`${full} full · ${tracks.length-full} previews`);
  setMeta(tracks.length+' results');
  render(tracks);
}

// ════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════
function render(list) {
  if (!list.length) {
    document.getElementById('ta').innerHTML='<div class="statebox">No tracks found.</div>';
    return;
  }
  const html = list.map((t,i)=>{
    const isNow = curIdx>=0 && tracks[curIdx]?.id===t.id;
    const ri = tracks.indexOf(t);
    const lc  = LANGS[t.lang]?.bc||'bgl';
    const ll  = LANGS[t.lang]?.label||'Global';
    const tag = t.full
      ? ''
      : '<span style="font-size:10px;color:var(--go);margin-left:5px;font-weight:600;opacity:.9">30s</span>';
    return `<div class="trow${isNow?' now':''}" id="tr-${t.id}" onclick="playAt(${ri})">
      <div class="tnum">${isNow?'<span class="eqpip"></span>':(i+1)}</div>
      ${t.img
        ?`<img class="timg" src="${t.img}" loading="lazy" onerror="this.outerHTML='<div class=tph>🎵</div>'">`
        :'<div class="tph">🎵</div>'}
      <div class="tinfo">
        <div class="tname">${esc(t.name)}${tag}</div>
        <div class="tsub">${esc(t.artist)}${t.album?' · '+esc(t.album):''}</div>
      </div>
      <div class="tbadge ${lc}">${ll}</div>
      <div class="tdur">${fmt(t.dur)}</div>
      <button class="tfav${favs.has(t.id)?' on':''}" onclick="event.stopPropagation();doFav('${t.id}',this)">${favs.has(t.id)?'♥':'♡'}</button>
    </div>`;
  }).join('');
  document.getElementById('ta').innerHTML=`<div class="tlist">${html}</div>`;
}

// ════════════════════════════════════════
//  PLAYBACK
// ════════════════════════════════════════
function playAt(idx) {
  if (idx<0||idx>=tracks.length) return;
  curIdx=idx;
  const t=tracks[idx];
  aud.pause();
  aud.src='';
  aud.src=t.src;
  aud.volume=document.getElementById('vr').value/100;
  aud.load();
  aud.play()
    .then(()=>{ isPlay=true; syncUI(t); addRecent(t); })
    .catch(err=>{ console.warn('Skip',t.name,err.message); setTimeout(nextTrack,700); });
}

function togglePlay() {
  if (curIdx<0) { if(tracks.length) playAt(0); return; }
  if (isPlay) { aud.pause(); }
  else        { aud.play().catch(()=>{}); }
}
function nextTrack() {
  if (!tracks.length) return;
  playAt(isShuffle ? Math.floor(Math.random()*tracks.length) : (curIdx+1)%tracks.length);
}
function prevTrack() {
  if (!tracks.length) return;
  if (aud.currentTime>3) { aud.currentTime=0; return; }
  playAt(isShuffle ? Math.floor(Math.random()*tracks.length) : (curIdx-1+tracks.length)%tracks.length);
}

aud.addEventListener('timeupdate',()=>{
  if (!aud.duration||isNaN(aud.duration)) return;
  const p=aud.currentTime/aud.duration*100;
  document.getElementById('pf').style.width=p+'%';
  document.getElementById('tc').textContent=fmt(aud.currentTime);
  document.getElementById('tt').textContent=fmt(aud.duration);
});
aud.addEventListener('ended',  ()=>{ isRepeat?(aud.currentTime=0,aud.play()):nextTrack(); });
aud.addEventListener('error',  ()=>setTimeout(nextTrack,700));
aud.addEventListener('play',   ()=>{ isPlay=true;  syncBtn(); setViz(true); });
aud.addEventListener('pause',  ()=>{ isPlay=false; syncBtn(); setViz(false); });

function seek(e) {
  if (!aud.duration||isNaN(aud.duration)) return;
  const r=document.getElementById('pbar').getBoundingClientRect();
  aud.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*aud.duration;
}
function setVol(v) { aud.volume=v/100; }

// ════════════════════════════════════════
//  SYNC UI
// ════════════════════════════════════════
function syncUI(t) {
  document.getElementById('npt').textContent=t.name;
  document.getElementById('nps').textContent=t.artist+(t.album?' · '+t.album:'');
  const liked=favs.has(t.id);
  const lb=document.getElementById('nplk');
  lb.textContent=liked?'♥':'♡'; lb.classList.toggle('on',liked);

  // Artwork
  const old=document.getElementById('npa');
  if (t.img) {
    const img=document.createElement('img');
    img.className='np-art'; img.id='npa'; img.src=t.img;
    img.onerror=()=>{ const ph=document.createElement('div'); ph.className='np-ph'; ph.id='npa'; ph.textContent='🎵'; img.replaceWith(ph); };
    old.replaceWith(img);
  } else if (old.tagName==='IMG') {
    const ph=document.createElement('div'); ph.className='np-ph'; ph.id='npa'; ph.textContent='🎵'; old.replaceWith(ph);
  }

  // Highlight row
  document.querySelectorAll('.trow').forEach(el=>el.classList.remove('now'));
  const row=document.getElementById('tr-'+t.id);
  if (row) { row.classList.add('now'); row.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  document.querySelectorAll('.trow').forEach((el,i)=>{
    el.querySelector('.tnum').innerHTML=el.classList.contains('now')?'<span class="eqpip"></span>':(i+1);
  });
}

function syncBtn() {
  document.getElementById('pico').innerHTML=isPlay
    ?'<rect x="6" y="4" width="4" height="16" fill="white" rx="1"/><rect x="14" y="4" width="4" height="16" fill="white" rx="1"/>'
    :'<polygon points="6,3 20,12 6,21" fill="white"/>';
}
function setViz(on) { document.getElementById('vizbars').classList.toggle('viz-on',on); }

// ════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════
function toggleShuffle() { isShuffle=!isShuffle; document.getElementById('shBtn').classList.toggle('on',isShuffle); }
function toggleRepeat()  { isRepeat=!isRepeat;   document.getElementById('rpBtn').classList.toggle('on',isRepeat); aud.loop=isRepeat; }

function doFav(id,btn) {
  if(favs.has(id)){favs.delete(id);btn.classList.remove('on');btn.textContent='♡';}
  else{favs.add(id);btn.classList.add('on');btn.textContent='♥';}
  localStorage.setItem('skp_f',JSON.stringify([...favs]));
  if(curIdx>=0&&tracks[curIdx]?.id===id){
    const lb=document.getElementById('nplk');
    lb.textContent=favs.has(id)?'♥':'♡'; lb.classList.toggle('on',favs.has(id));
  }
}
function likeNow() {
  if(curIdx<0)return;
  const t=tracks[curIdx];
  const btn=document.querySelector('#tr-'+t.id+' .tfav')||document.getElementById('nplk');
  doFav(t.id,btn);
}
function addRecent(t) {
  recent=[t,...recent.filter(r=>r.id!==t.id)].slice(0,50);
  localStorage.setItem('skp_r',JSON.stringify(recent));
}

// ════════════════════════════════════════
//  LIBRARY
// ════════════════════════════════════════
function viewFavs() {
  setLangOn(null); clearGenres();
  setTitle('Your <span>Favourites</span>');
  const list=tracks.filter(t=>favs.has(t.id));
  if(!list.length){document.getElementById('ta').innerHTML='<div class="statebox"><span style="font-size:36px">♡</span><span>Heart tracks to save them here!</span></div>';setMeta('');return;}
  render(list);
}
function viewRecent() {
  setLangOn(null); clearGenres();
  setTitle('<span>Recently</span> Played');
  if(!recent.length){document.getElementById('ta').innerHTML='<div class="statebox"><span style="font-size:36px">🕐</span><span>Nothing played yet.</span></div>';setMeta('');return;}
  tracks=recent; render(recent);
}
function viewQueue() {
  if(curIdx<0)return;
  setTitle('Up <span>Next</span>');
  render(tracks.slice(curIdx));
}

// ════════════════════════════════════════
//  MOBILE DRAWER
// ════════════════════════════════════════
function openDrawer() {
  const body=document.getElementById('drBody');
  body.innerHTML=document.getElementById('sb').innerHTML;
  body.querySelector('.sb-brand')?.remove();
  body.querySelectorAll('.lbtn').forEach(btn=>{
    const lang=btn.dataset.lang; if(!lang)return;
    btn.onclick=()=>{ loadLang(lang,btn); closeDrawer(); };
  });
  body.querySelectorAll('.gp').forEach(chip=>{
    const raw=chip.textContent.trim().toLowerCase()
      .replace('&','').replace('-','').replace(/\s+/g,'');
    const map={pop:'pop',rock:'rock',jazz:'jazz',classical:'classical',folk:'folk',
               hiphop:'hiphop',rb:'rnb',electronic:'electronic',ambient:'ambient',acoustic:'acoustic'};
    const key=map[raw]||raw;
    chip.onclick=()=>{ loadGenre(key,chip); closeDrawer(); };
  });
  const libs=body.querySelectorAll('.libtn');
  [viewFavs,viewRecent,viewQueue].forEach((fn,i)=>{ if(libs[i]) libs[i].onclick=()=>{ fn(); closeDrawer(); }; });
  document.getElementById('ovlay').classList.add('open');
}
function closeDrawer()   { document.getElementById('ovlay').classList.remove('open'); }
function ovClick(e)      { if(e.target.classList.contains('ovbg')) closeDrawer(); }

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function loading()      { document.getElementById('ta').innerHTML='<div class="statebox"><div class="spin"></div><span>Loading songs…</span></div>'; setMeta(''); }
function setTitle(h)    { document.getElementById('ctitle').innerHTML=h; }
function setMeta(t)     { document.getElementById('cmeta').textContent=t; }
function setLangOn(btn) { document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('on')); if(btn)btn.classList.add('on'); }
function clearGenres()  { document.querySelectorAll('.gp').forEach(c=>c.classList.remove('on')); }
function setBadge(full,txt) {
  const b=document.getElementById('badge');
  b.className='sbadge '+(full?'green':'gold');
  b.innerHTML=`<div class="blink ${full?'g':'y'}"></div> ${txt}`;
}
function fmt(s) {
  if(!s||isNaN(s)||s<=0)return'—';
  return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
}
function esc(s) { return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.code==='Space')    {e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight') nextTrack();
  if(e.code==='ArrowLeft')  prevTrack();
  if(e.code==='ArrowUp')   {const s=document.getElementById('vr');s.value=Math.min(100,+s.value+5);setVol(s.value);}
  if(e.code==='ArrowDown') {const s=document.getElementById('vr');s.value=Math.max(0,+s.value-5);setVol(s.value);}
  if(e.key==='s') toggleShuffle();
  if(e.key==='r') toggleRepeat();
});
document.getElementById('si').addEventListener('keydown',e=>{ if(e.key==='Enter') doSearch(); });

// ════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════
loadLang('hindi', document.querySelector('[data-lang="hindi"]'));
</script>
